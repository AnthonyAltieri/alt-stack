[project]
name = "python-pydantic-openapi"
version = "0.1.0"
description = "Convert OpenAPI schemas to Pydantic models with Python code generation"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Typing :: Typed",
]
dependencies = ["pydantic[email]>=2.7.0"]

[project.urls]
Homepage = "https://github.com/anthonyaltieri/alt-stack"
Repository = "https://github.com/anthonyaltieri/alt-stack"
Issues = "https://github.com/anthonyaltieri/alt-stack/issues"

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "ruff>=0.6.0",
  "ty>=0.0.0",
]

[project.scripts]
python-pydantic-openapi = "python_pydantic_openapi.cli:main"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
python_pydantic_openapi = ["py.typed"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
