name: Publish Packages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no publishing, tagging, or committing)'
        required: false
        default: 'false'
        type: boolean

jobs:
  detect-unpublished:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_packages: ${{ steps.set-matrix.outputs.has_packages }}
      probe_package: ${{ steps.set-matrix.outputs.probe_package }}
      first_publish_candidates: ${{ steps.set-matrix.outputs.first_publish_candidates }}
      skipped_private_packages: ${{ steps.set-matrix.outputs.skipped_private_packages }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-
        continue-on-error: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install nested workspace dependencies
        shell: bash
        run: |
          mapfile -t workspaces < <(find . -mindepth 2 -name pnpm-workspace.yaml ! -path "./pnpm-workspace.yaml")

          if [ ${#workspaces[@]} -eq 0 ]; then
            echo "No nested pnpm workspaces found"
            exit 0
          fi

          for workspace_file in "${workspaces[@]}"; do
            workspace_dir=$(dirname "$workspace_file")
            echo "📦 Installing nested workspace dependencies in ${workspace_dir}"
            pnpm install --dir "$workspace_dir" --frozen-lockfile
          done

      - name: Clean and rebuild all packages
        run: |
          echo "🧹 Cleaning all dist directories..."
          find packages -name "dist" -type d -exec rm -rf {} + 2>/dev/null || true
          echo "🔨 Rebuilding all packages..."
          pnpm turbo run build
          echo "✅ All packages rebuilt with fresh dist files"

      - name: Check if SDK regeneration needed
        id: sdk-check
        shell: bash
        run: |
          KAFKA_PRODUCER_CHANGED=false
          ALTSTACK_SERVER_CHANGED=false
          CHANGED_FILES=$(git diff --name-only HEAD^1 HEAD 2>/dev/null || echo "")

          if echo "$CHANGED_FILES" | grep -q "^examples/kafka-producer/"; then
            KAFKA_PRODUCER_CHANGED=true
            echo "📦 Kafka producer app changed - will regenerate SDK"
          fi

          if echo "$CHANGED_FILES" | grep -q "^examples/altstack-server/"; then
            ALTSTACK_SERVER_CHANGED=true
            echo "📦 Altstack server app changed - will regenerate SDK"
          fi

          echo "kafka_producer_changed=$KAFKA_PRODUCER_CHANGED" >> $GITHUB_OUTPUT
          echo "altstack_server_changed=$ALTSTACK_SERVER_CHANGED" >> $GITHUB_OUTPUT

      - name: Build core packages for SDK generation
        if: steps.sdk-check.outputs.kafka_producer_changed == 'true' || steps.sdk-check.outputs.altstack_server_changed == 'true'
        run: |
          pnpm --filter @alt-stack/result build
          pnpm --filter @alt-stack/zod-openapi build
          pnpm --filter @alt-stack/zod-asyncapi build
          pnpm --filter @alt-stack/kafka-core build
          pnpm --filter @alt-stack/server-core build
          pnpm --filter @alt-stack/server-hono build

      - name: Regenerate Kafka Producer SDK
        if: steps.sdk-check.outputs.kafka_producer_changed == 'true'
        run: |
          echo "🔄 Regenerating Kafka Producer SDK..."
          cd examples/kafka-producer
          pnpm generate-spec
          echo "✓ Generated AsyncAPI spec"
          cd ../..
          pnpm --filter @alt-stack/zod-asyncapi exec tsx src/cli.ts \
            ${{ github.workspace }}/examples/kafka-producer/asyncapi.json \
            -o ${{ github.workspace }}/packages/example-kafka-producer-sdk/src/index.ts
          echo "✓ Regenerated example-kafka-producer-sdk"

      - name: Regenerate Altstack Server SDK
        if: steps.sdk-check.outputs.altstack_server_changed == 'true'
        run: |
          echo "🔄 Regenerating Altstack Server SDK..."
          cd examples/altstack-server
          pnpm dev > server.log 2>&1 &
          SERVER_PID=$!
          MAX_ATTEMPTS=30
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            sleep 2
            if curl -f -s http://localhost:3000/docs/openapi.json > /dev/null 2>&1; then
              echo "✓ Server is ready"
              break
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "Waiting for server... attempt $ATTEMPT/$MAX_ATTEMPTS"
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "✗ Server failed to start"
            cat server.log || true
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi

          cd ../..
          pnpm --filter @alt-stack/zod-openapi exec tsx src/cli.ts \
            http://localhost:3000/docs/openapi.json \
            -o ${{ github.workspace }}/packages/example-altstack-server-sdk/src/index.ts
          kill $SERVER_PID 2>/dev/null || true
          echo "✓ Regenerated example-altstack-server-sdk"

      - name: Detect packages with unpublished versions
        id: set-matrix
        shell: bash
        run: |
          node << 'EOF'
          const { execSync } = require('child_process');
          const fs = require('fs');
          const path = require('path');

          const packageDirs = fs.readdirSync('packages')
            .map(dir => path.join('packages', dir))
            .filter(dir => {
              const pkgPath = path.join(dir, 'package.json');
              if (!fs.existsSync(pkgPath)) return false;
              try {
                const pkgJson = JSON.parse(fs.readFileSync(pkgPath, 'utf-8'));
                return pkgJson.name?.startsWith('@alt-stack/') && pkgJson.name !== '@alt-stack/typescript-config';
              } catch { return false; }
            });

          function getPublishedVersions(pkgName) {
            try {
              const raw = execSync(`npm view "${pkgName}" versions --json`, {
                encoding: 'utf-8',
                stdio: ['pipe', 'pipe', 'pipe']
              }).trim();

              if (!raw) {
                return { kind: 'published', versions: [] };
              }

              const parsed = JSON.parse(raw);

              return {
                kind: 'published',
                versions: Array.isArray(parsed) ? parsed : [parsed]
              };
            } catch (error) {
              const stderr = String(error.stderr || error.message || '');

              if (stderr.includes('E404')) {
                return { kind: 'not-found', versions: [] };
              }

              return { kind: 'error', error: stderr || String(error) };
            }
          }

          const matrix = [];
          const firstPublishCandidates = [];
          const skippedPrivatePackages = [];

          for (const dir of packageDirs) {
            const pkgJson = JSON.parse(fs.readFileSync(path.join(dir, 'package.json'), 'utf-8'));
            const pkgName = pkgJson.name;
            const localVersion = pkgJson.version;

            if (pkgJson.private) {
              console.log(`🔒 ${pkgName}@${localVersion} is private - skipping publish detection`);
              skippedPrivatePackages.push({ name: pkgName, directory: dir, version: localVersion });
              continue;
            }

            const published = getPublishedVersions(pkgName);

            if (published.kind === 'error') {
              console.error(`✗ Failed to inspect ${pkgName} on npm`);
              console.error(published.error);
              process.exit(1);
            }

            if (published.kind === 'not-found') {
              console.log(`⚠️ ${pkgName}@${localVersion} is not on npm yet - skipping automatic first publish`);
              firstPublishCandidates.push({ name: pkgName, directory: dir, version: localVersion });
              continue;
            }

            if (!published.versions.includes(localVersion)) {
              console.log(`📦 ${pkgName}@${localVersion} missing from npm - will publish`);
              matrix.push({ name: pkgName, directory: dir, version: localVersion });
            } else {
              console.log(`✓ ${pkgName}@${localVersion} already on npm - skipping`);
            }
          }

          console.log('\nPackages to publish:', JSON.stringify(matrix, null, 2));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `matrix=${JSON.stringify({ include: matrix })}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `has_packages=${matrix.length > 0}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `probe_package=${matrix[0]?.name ?? ''}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `first_publish_candidates=${JSON.stringify(firstPublishCandidates)}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `skipped_private_packages=${JSON.stringify(skippedPrivatePackages)}\n`);
          EOF

      - name: Summarize skipped packages
        shell: bash
        env:
          FIRST_PUBLISH_CANDIDATES: ${{ steps.set-matrix.outputs.first_publish_candidates }}
          SKIPPED_PRIVATE_PACKAGES: ${{ steps.set-matrix.outputs.skipped_private_packages }}
        run: |
          node << 'EOF'
          const fs = require('fs');

          const firstPublishCandidates = JSON.parse(process.env.FIRST_PUBLISH_CANDIDATES || '[]');
          const skippedPrivatePackages = JSON.parse(process.env.SKIPPED_PRIVATE_PACKAGES || '[]');
          const lines = [];

          if (skippedPrivatePackages.length > 0) {
            lines.push('### Skipped private packages');
            lines.push('');
            for (const pkg of skippedPrivatePackages) {
              lines.push(`- ${pkg.name}@${pkg.version}`);
            }
            lines.push('');
          }

          if (firstPublishCandidates.length > 0) {
            lines.push('### Skipped first-time publishes');
            lines.push('');
            lines.push('These packages are not on npm yet, so the workflow will not attempt an automatic first publish.');
            lines.push('Bootstrap them manually after confirming the npm token has write access to the `@alt-stack` scope.');
            lines.push('');
            for (const pkg of firstPublishCandidates) {
              lines.push(`- ${pkg.name}@${pkg.version}`);
            }
            lines.push('');
          }

          if (lines.length > 0) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join('\n')}\n`);
          }
          EOF

  verify-publish-access:
    needs: detect-unpublished
    if: needs.detect-unpublished.outputs.has_packages == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Verify npm token can manage the package scope
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PROBE_PACKAGE: ${{ needs.detect-unpublished.outputs.probe_package }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "Error: NPM_TOKEN secret is required"
            exit 1
          fi

          if [ -z "$PROBE_PACKAGE" ]; then
            echo "No published package requires an npm access probe"
            exit 0
          fi

          NPM_ACCOUNT="$(npm whoami)"
          echo "Authenticated to npm as ${NPM_ACCOUNT}"

          if npm access list collaborators "$PROBE_PACKAGE" --json >/dev/null; then
            echo "✓ Verified npm access for ${PROBE_PACKAGE}"
            exit 0
          fi

          echo "::error::NPM account ${NPM_ACCOUNT} cannot manage ${PROBE_PACKAGE}. Update NPM_TOKEN with write access to the @alt-stack scope before rerunning this workflow."
          exit 1

  publish:
    needs: [detect-unpublished, verify-publish-access]
    if: needs.detect-unpublished.outputs.has_packages == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-unpublished.outputs.matrix) }}
    env:
      DRY_RUN: ${{ github.event.inputs.dry_run == 'true' }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-
        continue-on-error: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build package
        shell: bash
        run: |
          PKG_JSON="${{ matrix.directory }}/package.json"
          if node -e "const p=require('./$PKG_JSON'); process.exit(p.scripts?.build ? 0 : 1)" 2>/dev/null; then
            echo "Building ${{ matrix.name }}..."
            pnpm turbo run build --filter="${{ matrix.name }}"
            echo "✓ Successfully built ${{ matrix.name }}"
          else
            echo "No build script found for ${{ matrix.name }}, skipping build"
          fi

      - name: Publish package
        shell: bash
        run: |
          if [ "$DRY_RUN" == "true" ]; then
            echo "🧪 [DRY-RUN] Would publish ${{ matrix.name }}@${{ matrix.version }}"
          else
            if [ -z "$NODE_AUTH_TOKEN" ]; then
              echo "Error: NPM_TOKEN secret is required"
              exit 1
            fi
            echo "Publishing ${{ matrix.name }}@${{ matrix.version }}..."
            cd "${{ matrix.directory }}"
            pnpm publish --access public --no-git-checks
            echo "✓ Successfully published ${{ matrix.name }}@${{ matrix.version }}"
          fi

      - name: Create git tag
        if: env.DRY_RUN != 'true'
        shell: bash
        run: |
          TAG_NAME="${{ matrix.name }}@${{ matrix.version }}"
          echo "Creating tag: $TAG_NAME"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME" 2>/dev/null || echo "Tag $TAG_NAME already exists"

      - name: Upload git tag
        if: env.DRY_RUN != 'true'
        shell: bash
        run: |
          mkdir -p /tmp/tags
          echo "${{ matrix.name }}@${{ matrix.version }}" > /tmp/tags/${{ hashFiles(format('{0}/package.json', matrix.directory)) }}.txt

      - name: Upload tag artifact
        if: env.DRY_RUN != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: git-tag-${{ hashFiles(format('{0}/package.json', matrix.directory)) }}
          path: /tmp/tags/
          retention-days: 1

      - name: Dry-run summary
        if: env.DRY_RUN == 'true'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧪 DRY-RUN SUMMARY for ${{ matrix.name }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  • Would publish: ${{ matrix.name }}@${{ matrix.version }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  finalize:
    needs: [detect-unpublished, publish]
    if: always() && needs.detect-unpublished.outputs.has_packages == 'true' && needs.publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DRY_RUN: ${{ github.event.inputs.dry_run == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download all tag artifacts
        if: env.DRY_RUN != 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: git-tag-*
          path: /tmp/tags
          merge-multiple: true
        continue-on-error: true

      - name: Push tags
        if: env.DRY_RUN != 'true'
        shell: bash
        run: |
          shopt -s nullglob
          for tag_file in /tmp/tags/*.txt; do
            if [ -f "$tag_file" ]; then
              TAG_NAME=$(cat "$tag_file")
              echo "Creating tag: $TAG_NAME"
              git tag -a "$TAG_NAME" -m "Release $TAG_NAME" 2>/dev/null || echo "Tag $TAG_NAME already exists"
            fi
          done
          shopt -u nullglob

          git push origin --tags || echo "No new tags to push"

      - name: Dry-run final summary
        if: env.DRY_RUN == 'true'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧪 DRY-RUN COMPLETE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ All checks passed! This workflow would have:"
          echo "  • Published packages to npm"
          echo "  • Created git tags"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
