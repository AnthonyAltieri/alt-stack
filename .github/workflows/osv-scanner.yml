name: OSV Scanner

on:
  pull_request:
    branches:
      - main
      - master
  merge_group:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "42 8 * * 1"

jobs:
  scan-pr:
    name: PR vulnerability scan
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout target branch
        run: |
          git checkout "$GITHUB_BASE_REF"
          git submodule update --recursive

      - name: Scan target branch
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --format=json
            --output=old-results.json
            --recursive
            ./

      - name: Checkout current branch
        run: |
          git checkout -f "$GITHUB_SHA"
          git submodule update --recursive

      - name: Scan current branch
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --format=json
            --output=new-results.json
            --recursive
            ./

      - name: Compare OSV results
        uses: google/osv-scanner-action/osv-reporter-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --output=results.sarif
            --old=old-results.json
            --new=new-results.json
            --gh-annotations=true
            --fail-on-vuln=true

      - name: Upload OSV SARIF
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: results.sarif

  scan-scheduled:
    name: Full vulnerability scan
    if: github.event_name == 'push' || github.event_name == 'schedule'
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
