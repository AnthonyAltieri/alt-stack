name: Publish Python Package

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (build only; no publish or tagging)"
        required: false
        default: false
        type: boolean

env:
  PACKAGE_DIR: packages/python-pydantic-openapi
  DIST_DIR: dist/python-pydantic-openapi

permissions:
  contents: read

jobs:
  detect-unpublished:
    runs-on: ubuntu-latest
    outputs:
      dry_run: ${{ steps.detect.outputs.dry_run }}
      package_name: ${{ steps.detect.outputs.package_name }}
      package_version: ${{ steps.detect.outputs.package_version }}
      should_publish: ${{ steps.detect.outputs.should_publish }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Detect unpublished package version
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$INPUT_DRY_RUN" == "true" ]]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

          python <<'PY'
          import json
          import os
          import tomllib
          import urllib.error
          import urllib.request
          from pathlib import Path

          package_dir = Path(os.environ["PACKAGE_DIR"])
          metadata = tomllib.loads(package_dir.joinpath("pyproject.toml").read_text())
          project = metadata["project"]
          package_name = project["name"]
          package_version = project["version"]

          version_exists = False
          try:
              with urllib.request.urlopen(f"https://pypi.org/pypi/{package_name}/json") as response:
                  payload = json.load(response)
          except urllib.error.HTTPError as error:
              if error.code != 404:
                  raise
              payload = {"releases": {}}

          version_exists = package_version in payload.get("releases", {})
          should_publish = not version_exists

          if version_exists:
              print(f"✓ {package_name}@{package_version} is already on PyPI - skipping publish")
          else:
              print(f"📦 {package_name}@{package_version} is not on PyPI - will publish")

          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as handle:
              handle.write(f"package_name={package_name}\n")
              handle.write(f"package_version={package_version}\n")
              handle.write(f"should_publish={'true' if should_publish else 'false'}\n")
          PY

      - name: Detection summary
        shell: bash
        env:
          PACKAGE_NAME: ${{ steps.detect.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.detect.outputs.package_version }}
          SHOULD_PUBLISH: ${{ steps.detect.outputs.should_publish }}
        run: |
          {
            echo "### Python package release detection"
            echo "- Package: \`${PACKAGE_NAME}\`"
            echo "- Version: \`${PACKAGE_VERSION}\`"
            if [[ "$SHOULD_PUBLISH" == "true" ]]; then
              echo "- Result: version is unpublished and eligible for release"
            else
              echo "- Result: version already exists on PyPI; no release needed"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: detect-unpublished
    if: needs.detect-unpublished.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: ${{ env.PACKAGE_DIR }}/uv.lock

      - name: Build distribution artifacts
        shell: bash
        run: |
          rm -rf "${{ env.DIST_DIR }}"
          uv build "${{ env.PACKAGE_DIR }}" --out-dir "${{ env.DIST_DIR }}"

      - name: Check distribution metadata
        shell: bash
        run: uvx twine check "${{ env.DIST_DIR }}"/*

      - name: List built artifacts
        shell: bash
        run: ls -lh "${{ env.DIST_DIR }}"

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-pydantic-openapi-dist
          path: ${{ env.DIST_DIR }}/*
          retention-days: 1

      - name: Dry-run summary
        if: needs.detect-unpublished.outputs.dry_run == 'true'
        shell: bash
        env:
          PACKAGE_NAME: ${{ needs.detect-unpublished.outputs.package_name }}
          PACKAGE_VERSION: ${{ needs.detect-unpublished.outputs.package_version }}
        run: |
          {
            echo "### Python package dry run"
            echo "- Built artifacts for \`${PACKAGE_NAME}@${PACKAGE_VERSION}\`"
            echo "- Publishing and git tagging were skipped because \`dry_run=true\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    needs: [detect-unpublished, build]
    if: needs.detect-unpublished.outputs.should_publish == 'true' && needs.detect-unpublished.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/${{ needs.detect-unpublished.outputs.package_name }}/
    permissions:
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download distribution artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-pydantic-openapi-dist
          path: ${{ env.DIST_DIR }}

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: ${{ env.DIST_DIR }}
          print-hash: true

  tag-release:
    needs: [detect-unpublished, publish]
    if: needs.detect-unpublished.outputs.should_publish == 'true' && needs.detect-unpublished.outputs.dry_run != 'true' && needs.publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Configure git
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push git tag
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_NAME: ${{ needs.detect-unpublished.outputs.package_name }}
          PACKAGE_VERSION: ${{ needs.detect-unpublished.outputs.package_version }}
        run: |
          TAG_NAME="${PACKAGE_NAME}@${PACKAGE_VERSION}"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME" 2>/dev/null || echo "Tag $TAG_NAME already exists"
          AUTH_HEADER="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${AUTH_HEADER}" push origin "$TAG_NAME" || echo "Tag $TAG_NAME already exists on origin"
